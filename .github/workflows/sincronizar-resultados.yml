name: Sincronizar resultados del Mundial

on:
schedule:
- cron: "17,47 * * * *"
workflow_dispatch:

permissions:
contents: write

concurrency:
group: sincronizar-resultados-mundial
cancel-in-progress: false

jobs:
actualizar-calendario:
runs-on: ubuntu-latest

```
steps:
  - name: Descargar repositorio
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Preparar Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Consultar resultados y propagar clasificados
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
    run: python3 actualizar_resultados.py

  - name: Regenerar y validar mundial.ics cuando haya cambios
    run: |
      if git diff --quiet; then
        echo "No hay cambios públicos que publicar."
        exit 0
      fi
      python3 generar_calendario.py
      python3 validar_calendario.py

  - name: Publicar actualización automática
    run: |
      if git diff --quiet; then
        echo "No hay cambios que confirmar."
        exit 0
      fi
      git config user.name "Calendario Mundial Bot"
      git config user.email "actions@github.com"
      git add datos/partidos_2026.json mundial.ics
      git commit -m "Actualiza resultados automáticamente"
      git push
```
